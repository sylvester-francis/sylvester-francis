# Context-pack manifest — the index a tool (or a person) reads first.
# Same philosophy as ctxforge: context is declared, versioned, reproducible.
pack: syltech-context
version: 1
load_order:
  - VOICE.md      # how to sound
  - SYLTECH.md    # what the company is
  - PROJECTS.md   # what the projects mean
  - RECENT.md     # live facts (posts, stars) — regenerated weekly
files:
  - path: VOICE.md
    owner: human
    max_age_days: 45
    purpose: Writing voice; machine-facing capsule between CAPSULE markers.
  - path: SYLTECH.md
    owner: human
    max_age_days: 45
    purpose: Company positioning, boilerplate bios, CTA list, brand pointers.
  - path: PROJECTS.md
    owner: human
    max_age_days: 45
    purpose: Project meaning and buyer relevance; no live numbers here.
  - path: PLAYBOOK.md
    owner: human
    max_age_days: 45
    purpose: Operating manual; external-tool capsule to copy-paste.
  - path: RECENT.md
    owner: machine
    max_age_days: 10
    purpose: Latest posts + live repo facts; regenerated by context-pack.yml.
enforcement:
  staleness_check: automation/pack/pack_refresh.py (Sundays)
  scorecard_row: "Context pack max age" (Mondays)
