# Monday Scorecard — one issue with last week's numbers vs fixed thresholds.
# No model involved, ever. Spec: automation/README.md.
name: Weekly scorecard

on:
  schedule:
    - cron: "0 11 * * 1"   # Mondays 11:00 UTC ≈ 07:00 Toronto (EDT)
  workflow_dispatch:

permissions:
  contents: read
  issues: write     # files the scorecard / failure issues
  actions: read     # reads workflow-run conclusions for the failure count

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — pack ages come from `git log`

      - name: Selftest (offline)
        run: python3 automation/scorecard/scorecard.py --selftest

      - name: Run scorecard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 automation/scorecard/scorecard.py
