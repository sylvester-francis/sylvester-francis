# Morning Scout — files a `scout-brief` issue with 0-3 scored story angles.
# Spec: automation/README.md. Runs on the DEFAULT branch only (GitHub rule
# for schedules) — merging to main is the on-switch.
name: Morning scout

on:
  schedule:
    - cron: "30 9 * * *"   # 09:30 UTC ≈ 05:30 Toronto (EDT) — waiting at breakfast
  workflow_dispatch:

permissions:
  contents: write   # commits automation/state/seen.json
  issues: write     # files the daily brief / failure issues

concurrency:
  group: scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Selftest (offline, must pass before touching the network)
        run: |
          python3 automation/scout/scout.py --selftest
          python3 automation/scout/enrich.py

      - name: Run scout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 automation/scout/scout.py

      - name: Commit dedupe state
        run: |
          if [ -z "$(git status --porcelain automation/state/seen.json)" ]; then
            echo "No state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/state/seen.json
          git commit -m "scout: update dedupe state"
          for i in 1 2 3 4; do
            git push && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
          echo "::error::failed to push scout state after 4 attempts"
          exit 1
