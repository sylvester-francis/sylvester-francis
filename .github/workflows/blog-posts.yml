name: Latest blog posts

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest Medium posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://medium.com/feed/@sylvesterranjithfrancis"
          comment_tag_name: "MEDIUM-POST-LIST"
          max_post_count: 5

      - name: Pull latest Substack posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          # Substack 403s direct requests from CI, so fetch through an RSS proxy.
          feed_list: "https://api.allorigins.win/raw?url=https%3A%2F%2Ftechwithsyl.substack.com%2Ffeed"
          comment_tag_name: "SUBSTACK-POST-LIST"
          max_post_count: 5
          user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          accept_header: "application/rss+xml, application/xml, text/xml; q=0.9, */*; q=0.8"
