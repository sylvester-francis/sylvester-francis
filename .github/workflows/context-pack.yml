# Context-pack refresh — regenerates machine-owned context/RECENT.md and
# nags (via `pack-stale` issue) when human-owned context files age past 45d.
# Spec: automation/README.md.
name: Context pack refresh

on:
  schedule:
    - cron: "0 10 * * 0"   # Sundays 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # commits context/RECENT.md
  issues: write     # pack-stale + failure issues

concurrency:
  group: context-pack
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — file ages come from `git log`

      - name: Selftest (offline)
        run: python3 automation/pack/pack_refresh.py --selftest

      - name: Refresh pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 automation/pack/pack_refresh.py

      - name: Commit regenerated RECENT.md
        run: |
          if [ -z "$(git status --porcelain context/RECENT.md)" ]; then
            echo "No pack change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add context/RECENT.md
          git commit -m "context-pack: weekly refresh of RECENT.md"
          for i in 1 2 3 4; do
            git push && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
          echo "::error::failed to push pack refresh after 4 attempts"
          exit 1
