<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" width="1100" height="220" role="img" aria-label="Sylvester Francis - Principal Platform Engineer - Book a call">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0c"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#17171c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1100" height="220" fill="url(#bg)"/>
  <rect width="1100" height="220" fill="url(#grid)"/>

  <!-- corner brackets -->
  <rect x="30" y="30" width="38" height="5" fill="#ff5c00"/><rect x="30" y="30" width="5" height="38" fill="#ff5c00"/>
  <rect x="1032" y="185" width="38" height="5" fill="#ff5c00"/><rect x="1065" y="152" width="5" height="38" fill="#ff5c00"/>

  <!-- S-mark badge -->
  <g transform="translate(48,50)">
    <rect x="1.5" y="1.5" width="117" height="117" rx="26" fill="url(#bg)" stroke="#ff5c00" stroke-width="2.5"/>
    <g transform="translate(60,60) scale(0.86) translate(-50,-50)">
      <path d="M74 27 H32 V50 H68 V73 H26" fill="none" stroke="#ff5c00" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="74" cy="27" r="6.5" fill="#ffa566"/>
    </g>
  </g>

  <!-- identity block -->
  <text x="212" y="76" fill="#ff5c00" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="6">PLATFORM  ·  INFRASTRUCTURE  ·  OPEN SOURCE</text>

  <text x="210" y="132" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="50" font-weight="bold" letter-spacing="1">SYLVESTER FRANCIS</text>
  <rect x="212" y="148" width="230" height="5" fill="#ff5c00"/>

  <text x="212" y="186" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" letter-spacing="4">PRINCIPAL PLATFORM ENGINEER  ·  8+ YEARS  ·  GO</text>

  <!-- CTA block -->
  <g transform="translate(838,74)">
    <rect x="0" y="0" width="196" height="52" rx="9" fill="#ff5c00"/>
    <text x="98" y="33" text-anchor="middle" fill="#0b0b0c" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" letter-spacing="3">BOOK A CALL</text>
  </g>
  <text x="936" y="146" text-anchor="middle" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">topmate.io/sylvester_francis</text>
</svg>
