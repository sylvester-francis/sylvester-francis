    <text x="1140" y="186">GO</text>
    <text x="1140" y="220">KUBERNETES</text>
    <text x="1140" y="254">OPENSTACK</text>
    <text x="1140" y="288">ORY</text>
  </g>
  <g fill="#ff5c00">
    <rect x="1156" y="142" width="8" height="12"/>
    <rect x="1156" y="176" width="8" height="12"/>
    <rect x="1156" y="210" width="8" height="12"/>
    <rect x="1156" y="244" width="8" height="12"/>
    <rect x="1156" y="278" width="8" height="12"/>
