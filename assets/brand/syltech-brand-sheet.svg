size="17" font-weight="bold">#ff5c00</text><text x="90" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Signal Orange</text><text x="90" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Primary accent</text><rect x="336" y="980" width="216" height="150" rx="12" fill="#ffa566" stroke="#2a2a2f" stroke-width="1"/><text x="352" y="1108" fill="#0b0b0c" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold">#ffa566</text><text x="336" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Amber</text><text x="336" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Accent / node</text><rect x="582" y="980" width="216" height="150" rx="12" fill="#0b0b0c" stroke="#2a2a2f" stroke-width="1"/><text x="598" y="1108" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold">#0b0b0c</text><text x="582" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Ink</text><text x="582" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Background</text><rect x="828" y="980" width="216" height="150" rx="12" fill="#161619" stroke="#2a2a2f" stroke-width="1"/><text x="844" y="1108" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold">#161619</text><text x="828" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Slate</text><text x="828" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Background 2</text><rect x="1074" y="980" width="216" height="150" rx="12" fill="#cfcfd4" stroke="#2a2a2f" stroke-width="1"/><text x="1090" y="1108" fill="#0b0b0c" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold">#cfcfd4</text><text x="1074" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Mist</text><text x="1074" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Text on dark</text><rect x="1320" y="980" width="216" height="150" rx="12" fill="#8f8f97" stroke="#2a2a2f" stroke-width="1"/><text x="1336" y="1108" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold">#8f8f97</text><text x="1320" y="1158" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Ash</text><text x="1320" y="1182" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14">Secondary text</text><rect x="90" y="1268" width="42" height="5" fill="#ff5c00"/><text x="90" y="1304" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" letter-spacing="4">CLEAR SPACE AND MINIMUM SIZE</text><g transform="translate(90,1330)"><rect x="0" y="0" width="268" height="268" fill="none" stroke="#ff5c00" stroke-width="1.5" stroke-dasharray="8 8"/><g transform="translate(34.0,34.0) scale(2.000)"><rect x="1.5" y="1.5" width="97" height="97" rx="22" fill="url(#bgrad)" stroke="#ff5c00" stroke-width="2.5"/><path d="M74 27 H32 V50 H68 V73 H26" fill="none" stroke="#ff5c00" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="74" cy="27" r="6.5" fill="#ffa566"/></g><text x="298" y="60" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold">Clear space</text><text x="298" y="92" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16">Keep padding on all sides equal to</text><text x="298" y="116" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16">one third of the mark height.</text><g transform="translate(298.0,170.0) scale(0.440)"><rect x="1.5" y="1.5" width="97" height="97" rx="22" fill="url(#bgrad)" stroke="#ff5c00" stroke-width="2.5"/><path d="M74 27 H32 V50 H68 V73 H26" fill="none" stroke="#ff5c00" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="74" cy="27" r="6.5" fill="#ffa566"/></g><text x="350" y="205" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Minimum 44 px</text><text x="298" y="236" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16">Do not render the mark smaller than 44 px / 0.4 in.</text></g><rect x="90" y="1688" width="42" height="5" fill="#ff5c00"/><text x="90" y="1724" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" letter-spacing="4">TYPOGRAPHY AND VOICE</text><text x="90" y="1760" fill="#cfcfd4" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold">Wordmark: heavy geometric sans, uppercase, tracked (Helvetica / Arial Bold; web: Archivo or Inter).</text><text x="90" y="1798" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18">Voice: concrete, technical, understated. No marketing adjectives, no emojis, no em dashes.</text><text x="90" y="1832" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18">Usage: orange on ink by default. On light surfaces use the badge (dark tile) so contrast holds.</text><line x1="90" y1="1980" x2="1510" y2="1980" stroke="#2a2a2f" stroke-width="1.5"/><text x="90" y="2030" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">syltechai.dev  ·  Syltech AI Systems, Inc.  .  Signal Orange #ff5c00 on Ink #0b0b0c</text></svg>