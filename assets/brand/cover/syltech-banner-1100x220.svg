<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" width="1100" height="220" role="img" aria-label="Syltech AI Systems - AI Platform Engineering - Book a discovery call">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0c"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#17171c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1100" height="220" fill="url(#bg)"/>
  <rect width="1100" height="220" fill="url(#grid)"/>

  <!-- corner brackets -->
  <rect x="30" y="30" width="38" height="5" fill="#ff5c00"/><rect x="30" y="30" width="5" height="38" fill="#ff5c00"/>
  <rect x="1032" y="185" width="38" height="5" fill="#ff5c00"/><rect x="1065" y="152" width="5" height="38" fill="#ff5c00"/>

  <!-- S-mark badge -->
  <g transform="translate(44,52) scale(1.16)">
    <rect x="1.5" y="1.5" width="97" height="97" rx="22" fill="url(#bg)" stroke="#ff5c00" stroke-width="2.5"/>
    <path d="M74 27 H32 V50 H68 V73 H26" fill="none" stroke="#ff5c00" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="74" cy="27" r="6.5" fill="#ffa566"/>
  </g>

  <!-- company lockup -->
  <text x="190" y="104" fill="#ffffff" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="46" font-weight="bold" letter-spacing="4">SYLTECH</text>
  <text x="192" y="136" fill="#ff5c00" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" letter-spacing="11">AI SYSTEMS</text>
  <text x="192" y="168" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">AI Platform Engineering · Cloud Infrastructure · Developer Tooling</text>

  <!-- CTA block -->
  <text x="1050" y="60" text-anchor="end" fill="#ff5c00" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="2">syltechai.dev</text>
  <g transform="translate(762,80)">
    <rect x="0" y="0" width="288" height="54" rx="9" fill="#ff5c00"/>
    <text x="144" y="34" text-anchor="middle" fill="#0b0b0c" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" letter-spacing="2">BOOK A DISCOVERY CALL</text>
  </g>
  <text x="906" y="162" text-anchor="middle" fill="#8f8f97" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">calendly.com/syltechai/discovery-call</text>
</svg>
